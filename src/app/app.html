<app-navbar />

<main class="main-layout">
  <section class="book-list-section">
    <h2>精選好書</h2>
    <div class="book-grid">
      @for (book of books(); track book.id) {
        <app-book-card
          [bookData]="book"
          (addToCart)="handleAddToCart($event)" />
      }
    </div>
  </section>

  <section class="cart-section">
    <app-cart-table />
  </section>
</main>

<app-footer />
